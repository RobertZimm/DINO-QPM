arch: dinov2 # options: dino, dinov2, dinov3, resnet50

# Available model_types are:
# small, base, large, giant; also with _reg
# neco_small, neco_base; also with _reg
# sinder
model_type: base_reg

mlp: True # whether to use an mlp on top of the features; only for dinov2

use_prototypes: False

sldd_mode: qpm # options: qsenn, sldd, qpm

dataset: CUB2011 # \in [CUB2011, StanfordCars]

# Whether to load pre-computed feature maps/vectors from disk.
# If False, the frozen backbone is run live during training instead.
# Used for VFM datasets handled through DinoData (CUB2011, StanfordCars).
# Ignored for non-VFM architectures (e.g. resnet50).
load_pre_computed: True

log_dir_prefix: DINO-QPM

default_save_dir: /home/zimmerro/tmp/saveCCR                                  
